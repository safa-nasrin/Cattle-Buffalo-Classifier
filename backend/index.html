  <body>
    <h1>Buffalo Breed Classifier</h1>

    <div class="card">
      <button id="startUploadBtn">Upload / Take Photo</button>

      <div id="uploadSection" class="hidden">
    
        <div class="media-box">
          <label for="fileInput">🖼️ Select Photo</label>
          <input type="file" id="fileInput" accept="image/*" />
        </div>

       
        <div class="media-box">
          <button id="openCameraBtn">📷 Open Camera</button>
          <button id="closeCameraBtn" class="hidden">✖ Close Camera</button>

          <video id="video" autoplay playsinline class="hidden"></video>
          <button id="captureBtn" class="hidden">📸 Capture</button>
          <img id="snapshot" class="hidden" />
        </div>

        <button id="removeBtn" class="hidden" style="background: #dc3545">
          🗑️ Remove
        </button>

        <button id="submitBtn">Predict Breed</button>
      </div>

      <div id="result"></div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const uploadSection = document.getElementById("uploadSection");
      const startUploadBtn = document.getElementById("startUploadBtn");

      const openCameraBtn = document.getElementById("openCameraBtn");
      const closeCameraBtn = document.getElementById("closeCameraBtn");
      const captureBtn = document.getElementById("captureBtn");
      const removeBtn = document.getElementById("removeBtn");

      const video = document.getElementById("video");
      const snapshot = document.getElementById("snapshot");
      const submitBtn = document.getElementById("submitBtn");
      const resultDiv = document.getElementById("result");

      let currentStream = null;
      let selectedFile = null;
      let capturedBlob = null;

      startUploadBtn.onclick = () => {
        uploadSection.classList.remove("hidden");
        startUploadBtn.style.display = "none";
      };

      fileInput.onchange = (e) => {
        selectedFile = e.target.files[0];
        capturedBlob = null;
        stopCamera();
        snapshot.classList.add("hidden");
        removeBtn.classList.remove("hidden");
      };

      openCameraBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
        });
        video.srcObject = stream;
        currentStream = stream;
        video.classList.remove("hidden");
        captureBtn.classList.remove("hidden");
        closeCameraBtn.classList.remove("hidden");
        selectedFile = null;
        snapshot.classList.add("hidden");
      };

      closeCameraBtn.onclick = stopCamera;

      function stopCamera() {
        if (currentStream) {
          currentStream.getTracks().forEach((t) => t.stop());
          currentStream = null;
        }
        video.classList.add("hidden");
        captureBtn.classList.add("hidden");
        closeCameraBtn.classList.add("hidden");
      }

      captureBtn.onclick = () => {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);

        canvas.toBlob((blob) => {
          capturedBlob = blob;
          snapshot.src = URL.createObjectURL(blob);
          snapshot.classList.remove("hidden");
          removeBtn.classList.remove("hidden");
        });

        stopCamera();
      };

      removeBtn.onclick = () => {
        selectedFile = null;
        capturedBlob = null;
        fileInput.value = "";
        snapshot.classList.add("hidden");
        removeBtn.classList.add("hidden");
        resultDiv.innerText = "";
      };

      submitBtn.onclick = async () => {
        let blobToSend = capturedBlob || selectedFile;
        if (!blobToSend) {
          alert("Please select or capture an image.");
          return;
        }

        resultDiv.innerText = "Processing...";

        const form = new FormData();
        form.append("image", blobToSend, "image.jpg");

        try {
          const resp = await fetch("http://127.0.0.1:9001/predict", {
            method: "POST",
            body: form,
          });

          const data = await resp.json();

          if (data.predicted_breed) {
            resultDiv.innerText = `Breed: ${
              data.predicted_breed
            } (Confidence: ${(data.confidence * 100).toFixed(1)}%)`;
          } else {
            resultDiv.innerText = "Could not recognize breed";
          }
        } catch (err) {
          console.error(err);
          resultDiv.innerText = "Error contacting backend";
        }
      };
    </script>
  </body>
</html>

  <body>
    <h1>🐃 Buffalo Breed Expert</h1>

    <div class="card">
      <div id="dropZone" class="drop-zone">
        <p id="dropText">
          <b>DRAG IMAGE HERE</b><br />
          (From computer or another tab!)<br />
          <small>or click to browse</small>
        </p>
        <img id="snapshot" class="hidden" />
      </div>

      <div id="cameraArea">
        <button id="openCameraBtn">📷 Use Camera</button>
        <div id="videoContainer" class="hidden">
          <video id="video" autoplay playsinline></video>
          <button id="captureBtn" style="background: #ffc107; width: auto">
            📸 Capture
          </button>
        </div>
      </div>

      <input type="file" id="fileInput" class="hidden" accept="image/*" />
      <button id="submitBtn">Analyze Breed</button>

      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const snapshot = document.getElementById("snapshot");
      const resultDiv = document.getElementById("result");
      const dropText = document.getElementById("dropText");

      let selectedFile = null;
      let stream = null;

      // --- 1. UPDATED DROP LOGIC (Handles Files AND Internet Links) ---
      ["dragenter", "dragover", "dragleave", "drop"].forEach((name) => {
        dropZone.addEventListener(name, (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
      });

      dropZone.addEventListener("dragover", () =>
        dropZone.classList.add("dragover")
      );
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("dragover")
      );

      dropZone.addEventListener("drop", async (e) => {
        dropZone.classList.remove("dragover");

        // A. Handle local files from your computer folders
        const files = e.dataTransfer.files;
        if (files && files[0]) {
          handleFile(files[0]);
          return;
        }

        // B. Handle images dragged from OTHER BROWSER TABS
        const htmlData = e.dataTransfer.getData("text/html");
        if (htmlData) {
          const div = document.createElement("div");
          div.innerHTML = htmlData;
          const img = div.querySelector("img");
          if (img && img.src) {
            fetchWebImage(img.src);
            return;
          }
        }

        // C. Fallback if only the URL text was dragged
        const plainUrl = e.dataTransfer.getData("text/plain");
        if (plainUrl && plainUrl.startsWith("http")) {
          fetchWebImage(plainUrl);
        }
      });

      // Helper to download image from a URL
      async function fetchWebImage(url) {
        resultDiv.innerHTML = "⏳ Fetching image from web...";
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          const file = new File([blob], "web_image.jpg", { type: blob.type });
          handleFile(file);
        } catch (err) {
          resultDiv.innerHTML =
            "❌ Security Block: This site protects its images. Right-click > Copy Image, then Paste (Ctrl+V) here!";
        }
      }

      // --- 2. BROWSE & PASTE & CAMERA ---
      dropZone.onclick = () => fileInput.click();
      fileInput.onchange = (e) => handleFile(e.target.files[0]);

      window.addEventListener("paste", (e) => {
        const item = e.clipboardData.items[0];
        if (item && item.type.includes("image")) handleFile(item.getAsFile());
      });

      document.getElementById("openCameraBtn").onclick = async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
          document.getElementById("video").srcObject = stream;
          document.getElementById("videoContainer").classList.remove("hidden");
        } catch (err) {
          alert("Camera access denied.");
        }
      };

      document.getElementById("captureBtn").onclick = () => {
        const canvas = document.createElement("canvas");
        const v = document.getElementById("video");
        canvas.width = v.videoWidth;

        const url =
          selectedCategory === "cattle"
            ? "http://127.0.0.1:9003/predict"
            : "http://127.0.0.1:9002/predict";

        try {
          const response = await fetch(url, { method: "POST", body: fd });
          const data = await response.json();

          // Check your browser console (F12) to see this table!
          console.log("--- AI RESPONSE ---");
          console.table(data);

          // 1. Check for Server-side Errors
          if (data.error) {
            resultDiv.innerHTML = `<span style="color:red;">❌ Server Error: ${data.error}</span>`;
            return;
          }

          // 2. Check for UNKNOWN
          if (data.predicted_breed === "UNKNOWN") {
            resultDiv.innerHTML = `<span style="color:red;">❌ ${
              data.message || "Breed Not Recognized"
            }</span>`;
          }
          // 3. SUCCESS PATH
          else if (data.predicted_breed && data.confidence !== undefined) {
            const cleanName = data.predicted_breed.replace(/_/g, " ");
            const percentage = (data.confidence * 100).toFixed(1);

            resultDiv.innerHTML = `✅ Result: <span style="color:#28a745;">${cleanName}</span><br> 
                                   📊 Confidence: ${percentage}%`;
          } else {
            resultDiv.innerHTML = "❌ Error: Response missing data keys";
            console.log("Missing keys in:", data);
          }
        } catch (err) {
          console.error("Connection Error:", err);
          resultDiv.innerHTML = `❌ Backend Error: Is the ${selectedCategory} script running on the correct port?`;
        }
      };

      removeBtn.onclick = () => location.reload();
    </script>
  </body>
</html>
